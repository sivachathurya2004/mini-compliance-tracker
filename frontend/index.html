<!DOCTYPE html>
<html>
<head>
    <title>Compliance Tracker</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container py-4">

    <h1 class="text-center text-primary mb-4">📊 Compliance Tracker</h1>

    <div class="row">

        <!-- Clients -->
        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    Clients
                </div>
                <ul class="list-group list-group-flush" id="clients"></ul>
            </div>
        </div>

        <!-- Tasks -->
        <div class="col-md-8">

            <div class="card shadow-sm mb-3">
                <div class="card-header bg-success text-white d-flex justify-content-between align-items-center">
                    Tasks

                    <select id="statusFilter" class="form-select w-50" onchange="loadTasks()">
                        <option value="">All</option>
                        <option value="Pending">Pending</option>
                        <option value="Completed">Completed</option>
                    </select>
                </div>

                <ul class="list-group list-group-flush" id="tasks"></ul>
            </div>

            <!-- Add Task -->
            <div class="card shadow-sm">
                <div class="card-header bg-dark text-white">
                    Add Task
                </div>

                <div class="card-body">

                    <div class="row g-2">

                        <div class="col-md-4">
                            <input id="title" class="form-control" placeholder="Title">
                        </div>

                        <div class="col-md-3">
                            <input id="category" class="form-control" placeholder="Category">
                        </div>

                        <div class="col-md-3">
                            <input id="due_date" type="date" class="form-control">
                        </div>

                        <div class="col-md-2">
                            <button class="btn btn-primary w-100" onclick="addTask()">Add</button>
                        </div>

                    </div>

                </div>
            </div>

        </div>

    </div>

</div>

<script src="app.js"></script>

</body>
</html>
